<!DOCTYPE html>
<html>
<head>
    <title>Rectangular Prism with Cylindrical Cavity Volume Calculator</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #dfe9f3;
            margin: 0;
            padding: 40px;
        }

        .box {
            width: 380px;
            margin: auto;
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0px 4px 12px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            color: #2c3e50;
            font-size: 22px;
            margin-bottom: 20px;
        }

        label {
            font-weight: bold;
            color: #333;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            margin-bottom: 15px;
            border: 1px solid #bbb;
            border-radius: 6px;
            font-size: 14px;
            box-sizing: border-box;
        }

        .btn {
            width: 48%;
            padding: 10px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
        }

        .calculate {
            background: #3498db;
            color: white;
        }

        .clear {
            background: #95a5a6;
            color: white;
        }

        .buttons {
            display: flex;
            justify-content: space-between;
        }

        #result {
            margin-top: 20px;
            padding: 15px;
            background: #f7f9fb;
            border-left: 5px solid #3498db;
            border-radius: 6px;
            font-weight: bold;
            color: #2c3e50;
            text-align: center;
        }
    </style>
</head>

<body>

<div class="box">

    <h2>Rectangular Prism with Cylindrical Cavity Volume Calculator</h2>

    <label>Length (cm)</label>
    <input type="number" id="length">

    <label>Width (cm)</label>
    <input type="number" id="width">

    <label>Height (cm)</label>
    <input type="number" id="height">

    <label>Radius of Cylindrical Hole (cm)</label>
    <input type="number" id="radius">

    <label>Irregularity Percentage (%)</label>
    <input type="number" id="irregularity">

    <div class="buttons">
        <button class="btn calculate" onclick="calculate()">Calculate</button>
        <button class="btn clear" onclick="clearAll()">Clear</button>
    </div>

    <div id="result">
        Final Volume will appear here
    </div>

</div>

<script>
function calculate() {
    let L = parseFloat(document.getElementById("length").value);
    let W = parseFloat(document.getElementById("width").value);
    let H = parseFloat(document.getElementById("height").value);
    let R = parseFloat(document.getElementById("radius").value) || 0;
    let T = parseFloat(document.getElementById("irregularity").value) || 0;

    if (!L || !W || !H) {
        alert("Please enter valid dimensions.");
        return;
    }

    let prismVolume = L * W * H;
    let cylinderVolume = Math.PI * R * R * H;
    let netVolume = prismVolume - cylinderVolume;
    let finalVolume = netVolume * (1 - T / 100);

    if (finalVolume < 0) {
        finalVolume = 0;
    }

    document.getElementById("result").innerHTML =
        "Final Volume: " + finalVolume.toFixed(2) + " cm³";
}

function clearAll() {
    document.getElementById("length").value = "";
    document.getElementById("width").value = "";
    document.getElementById("height").value = "";
    document.getElementById("radius").value = "";
    document.getElementById("irregularity").value = "";
    document.getElementById("result").innerHTML =
        "Final Volume will appear here";
}
</script>

</body>
</html>
</html>
