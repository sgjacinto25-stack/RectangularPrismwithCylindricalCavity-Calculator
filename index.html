<!DOCTYPE html>
<html>
<head>
    <title>Volume Calculator</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #dbeafe, #f0f9ff);
            margin: 0;
            padding: 40px;
        }

        .container {
            width: 420px;
            margin: auto;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            border-top: 8px solid #2563eb;
        }

        h2 {
            text-align: center;
            color: #1e3a8a;
            margin-bottom: 25px;
            font-size: 24px;
        }

        .subtitle {
            text-align: center;
            font-size: 14px;
            color: #555;
            margin-bottom: 20px;
        }

        label {
            font-weight: bold;
            color: #333;
            display: block;
            margin-top: 12px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-top: 6px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-size: 14px;
            box-sizing: border-box;
            background: #f8fafc;
        }

        input:focus {
            outline: none;
            border-color: #2563eb;
        }

        .buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 25px;
        }

        button {
            width: 48%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
        }

        .calculate {
            background: #2563eb;
            color: white;
        }

        .calculate:hover {
            background: #1d4ed8;
        }

        .clear {
            background: #64748b;
            color: white;
        }

        .clear:hover {
            background: #475569;
        }

        #result {
            margin-top: 25px;
            padding: 18px;
            background: #eff6ff;
            border-left: 6px solid #2563eb;
            border-radius: 8px;
            text-align: center;
            font-size: 16px;
            font-weight: bold;
            color: #1e3a8a;
        }
    </style>
</head>

<body>

<div class="container">

    <h2>Volume Calculator</h2>

    <div class="subtitle">
        Calculator for Irregular Solid
    </div>

    <label>Length (cm)</label>
    <input type="number" id="length">

    <label>Width (cm)</label>
    <input type="number" id="width">

    <label>Height (cm)</label>
    <input type="number" id="height">

    <label>Radius (cm)</label>
    <input type="number" id="radius">

    <label>Irregularity Percentage (%)</label>
    <input type="number" id="irregularity">

    <div class="buttons">
        <button class="calculate" onclick="calculate()">Calculate</button>
        <button class="clear" onclick="clearAll()">Clear</button>
    </div>

    <div id="result">
        Final Volume will appear here
    </div>

</div>

<script>
function calculate() {
    let L = parseFloat(document.getElementById("length").value);
    let W = parseFloat(document.getElementById("width").value);
    let H = parseFloat(document.getElementById("height").value);
    let R = parseFloat(document.getElementById("radius").value) || 0;
    let T = parseFloat(document.getElementById("irregularity").value) || 0;

    if (!L || !W || !H) {
        alert("Please enter valid dimensions.");
        return;
    }

    let prismVolume = L * W * H;
    let cylinderVolume = Math.PI * R * R * H;
    let netVolume = prismVolume - cylinderVolume;
    let finalVolume = netVolume * (1 - T / 100);

    if (finalVolume < 0) {
        finalVolume = 0;
    }

    document.getElementById("result").innerHTML =
        "Final Volume: " + finalVolume.toFixed(2) + " cm³";
}

function clearAll() {
    document.getElementById("length").value = "";
    document.getElementById("width").value = "";
    document.getElementById("height").value = "";
    document.getElementById("radius").value = "";
    document.getElementById("irregularity").value = "";
    document.getElementById("result").innerHTML =
        "Final Volume will appear here";
}
</script>

</body>
</html>
</html>
